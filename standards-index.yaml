# UK Government Engineering Standards — Index
# Every standard has one row here. Consumers filter by context (role, platform, data_class).
# Conformance levels follow RFC 2119: MUST | SHOULD | COULD
#
# Enforcement types:
#   automated    — checked by CI/CD pipeline (file exists, pattern match, config present)
#   peer-review  — checked during code review on pull requests
#   periodic-audit — checked at service assessment or quarterly review
#   ways-of-working — team practice, documented in team charter/runbooks

standards:
  - id: ENG-001
    title: Open source by default
    conformance: MUST
    enforcement: [automated, periodic-audit]
    applies_to:
      role: any
      platform: any
    category: ENG
    source: technology-code-of-practice
    tags: [open-source, reuse, transparency]

  - id: ENG-002
    title: Version control for all source code
    conformance: MUST
    enforcement: [automated, peer-review]
