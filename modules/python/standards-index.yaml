standards:
  - id: PY-001
    title: Use logging module, not print()
    conformance: SHOULD
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: ENG
    source: python-best-practices
    tags: [python, logging, observability]

  - id: PY-002
    title: Type hints on public function signatures
    conformance: SHOULD
    enforcement: [peer-review]
    applies_to:
      role: any
      platform: python
    category: ENG
    source: python-best-practices
    tags: [python, typing, maintainability]

  - id: PY-003
    title: No raw SQL string construction
    conformance: MUST
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: SEC
    source: owasp-top-10
    tags: [python, sql-injection, security]

  - id: PY-004
    title: No wildcard imports
    conformance: SHOULD
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: ENG
    source: python-best-practices
    tags: [python, imports, maintainability]

  - id: PY-005
    title: Django CSRF protection must not be disabled
    conformance: MUST
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: SEC
    source: owasp-top-10
    tags: [python, django, csrf, security]

  - id: PY-006
    title: Flask secret key must not be hardcoded
    conformance: MUST
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: SEC
    source: SEC-003
    tags: [python, flask, secrets, security]

  - id: PY-007
    title: Use Django ORM or SQLAlchemy, not raw SQL
    conformance: SHOULD
    enforcement: [peer-review, automated]
    applies_to:
      role: any
      platform: python
    category: SEC
    source: owasp-top-10
    tags: [python, django, flask, sql, orm]

  - id: PY-008
    title: Django DEBUG must be False in production config
    conformance: MUST
    enforcement: [automated]
    applies_to:
      role: any
      platform: python
    category: SEC
    source: django-deployment-checklist
    tags: [python, django, config, security]
