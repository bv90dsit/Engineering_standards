<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-header__title">{{ site.title }}</a>
      <nav class="site-header__nav">
        <a href="{{ '/about' | relative_url }}" {% if page.permalink == '/about/' or page.url == '/about/' %}class="active" aria-current="page"{% endif %}>About</a>
        <a href="{{ '/methodology' | relative_url }}" {% if page.permalink == '/methodology/' or page.url == '/methodology/' %}class="active" aria-current="page"{% endif %}>Methodology</a>
        <a href="{{ '/sources-graph' | relative_url }}" {% if page.permalink == '/sources-graph/' or page.url == '/sources-graph/' %}class="active" aria-current="page"{% endif %}>Sources</a>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.permalink == '/' %}class="active" aria-current="page"{% endif %}>Standards</a>
        <a href="https://github.com/bv90dsit/Engineering_standards" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p>UK Government Engineering Standards &mdash; Open source under the <a href="https://github.com/bv90dsit/Engineering_standards/blob/main/LICENCE">MIT Licence</a>.</p>
      <p>Built with Jekyll and GitHub Pages.</p>
    </div>
  </footer>
</body>
</html>
