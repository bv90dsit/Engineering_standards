# Trusted source domains for standards traceability
#
# Only Tier 1 and Tier 2 domains are accepted in source traceability tables.
# Library docs, books, and practitioner blogs belong in "What good looks like"
# (implementation guidance), not in "Source traceability" (authority).
#
# TIERS:
#   Tier 1 — Authoritative: Government bodies, international standards organisations,
#            legislation. Can be cited as the sole authority for a MUST standard.
#   Tier 2 — Established: Widely recognised industry bodies, peer-reviewed research,
#            official language/framework documentation. Can support a standard but
#            should be paired with a Tier 1 source for MUST standards.
#
# CRITERIA FOR INCLUSION:
#   - Would a GDS service assessor accept this as evidence?
#   - Is this a primary source (not a blog about a primary source)?
#   - Is this organisation/project recognised by the UK Gov digital community?
#   - Has this source been stable for 3+ years?
#
# TO ADD A NEW DOMAIN: add it below with a rationale comment, in a PR.

trusted_domains:

  # ─── TIER 1: Authoritative ─────────────────────────────────────────────
  # Government, legislation, international standards bodies.

  - gov.uk                  # UK Government (Technology Code of Practice, Service Standard, GDS)
  - legislation.gov.uk      # UK legislation (Accessibility Regs, Equality Act, DPA)
  - ncsc.gov.uk             # National Cyber Security Centre (Secure by Design)
  - data.gov.uk             # UK Government open data portal
  - ico.org.uk              # Information Commissioner's Office (UK GDPR guidance)
  - owasp.org               # Open Web Application Security Project (Top 10, ASVS)
  - w3.org                  # World Wide Web Consortium (WCAG, web standards)
  - iso.org                 # International Organization for Standardization
  - csrc.nist.gov           # NIST Computer Security Resource Center (SP 800 series)
  - pages.nist.gov          # NIST publications (SP 800-63 Digital Identity)
  - cisecurity.org          # Center for Internet Security (CIS Benchmarks)
  - opendatacharter.net     # International Open Data Charter

  # ─── TIER 2: Established ───────────────────────────────────────────────
  # Industry research with broad recognition, official language/framework docs.

  - dora.dev                # DORA metrics (Google-backed, State of DevOps research)
  - sre.google              # Google SRE Book (de facto standard for reliability engineering)
  - itrevolution.com        # IT Revolution (Accelerate — peer-reviewed delivery research)
  - 12factor.net            # Twelve-Factor App methodology (widely adopted, 10+ years)
  - agilealliance.org       # Agile Alliance (definitions and research)
  - spec.openapis.org       # OpenAPI Specification (industry standard for API contracts)
  - docs.python.org         # Python official documentation
  - peps.python.org         # Python Enhancement Proposals (language-level standards)
  - docs.djangoproject.com  # Django official documentation (deployment checklist, security)
  - flask.palletsprojects.com  # Flask official documentation
  - docs.spring.io          # Spring Framework official documentation
  - spring.io               # Spring project (official team communications)
  - typescriptlang.org      # TypeScript official documentation and handbook
  - react.dev               # React official documentation
  - docs.aws.amazon.com     # AWS documentation (Well-Architected Framework)
  - slf4j.org               # SLF4J official documentation (logging facade standard)
  - docs.sqlalchemy.org     # SQLAlchemy official documentation

  # ─── Internal references ────────────────────────────────────────────────
  - github.com              # Cross-references to other standards in this repo
